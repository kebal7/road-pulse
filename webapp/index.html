<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road-Pulse — Nepal</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f1117;
      --sur: #1a1d27;
      --s2: #22263a;
      --b: rgba(255, 255, 255, 0.08);
      --b2: rgba(255, 255, 255, 0.15);
      --tx: #e8eaf0;
      --t2: #8b90a8;
      --t3: #555a72;
      --ac: #4f8ef7;
      --acd: rgba(79, 142, 247, 0.15);
      --fn: 'DM Sans', system-ui, sans-serif;
    }

    html,
    body {
      height: 100%;
      font-family: var(--fn);
      background: var(--bg);
      color: var(--tx);
      overflow: hidden
    }

    #map {
      position: absolute;
      inset: 0
    }

    /* TOP BAR */
    #bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      background: var(--sur);
      border-bottom: 1px solid var(--b);
      height: 52px
    }

    #logo {
      padding: 0 18px;
      font-size: 15px;
      font-weight: 500;
      color: var(--tx);
      border-right: 1px solid var(--b);
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }

    #dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ac);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    #bc {
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex: 1;
      gap: 0;
      overflow: hidden;
      height: 100%
    }

    .b {
      font-size: 13px;
      color: var(--t2);
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s
    }

    .b:hover {
      color: var(--tx)
    }

    .b.a {
      color: var(--ac);
      font-weight: 500
    }

    .bs {
      margin: 0 6px;
      color: var(--t3);
      font-size: 11px
    }

    #sw {
      padding: 0 10px;
      border-left: 1px solid var(--b);
      height: 100%;
      display: flex;
      align-items: center
    }

    #s {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--tx);
      font-family: var(--fn);
      width: 165px;
      outline: none;
      transition: border-color .15s, width .2s
    }

    #s::placeholder {
      color: var(--t3)
    }

    #s:focus {
      border-color: var(--ac);
      width: 205px
    }

    /* PANEL */
    #panel {
      position: absolute;
      left: 0;
      top: 52px;
      bottom: 0;
      z-index: 9;
      width: 252px;
      background: var(--sur);
      border-right: 1px solid var(--b);
      display: flex;
      flex-direction: column;
      transition: transform .25s cubic-bezier(.4, 0, .2, 1)
    }

    #panel.h {
      transform: translateX(-252px)
    }

    #ph {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--b);
      flex-shrink: 0
    }

    #plv {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 4px
    }

    #pt {
      font-size: 14px;
      font-weight: 500;
      color: var(--tx)
    }

    #ps {
      font-size: 12px;
      color: var(--t3);
      margin-top: 2px
    }

    #pl {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0
    }

    #pl::-webkit-scrollbar {
      width: 3px
    }

    #pl::-webkit-scrollbar-thumb {
      background: var(--b2);
      border-radius: 2px
    }

    .li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--t2);
      cursor: pointer;
      transition: background .1s, color .1s;
      border-left: 2px solid transparent
    }

    .li:hover {
      background: var(--s2);
      color: var(--tx)
    }

    .li.on {
      background: var(--acd);
      color: var(--ac);
      border-left-color: var(--ac)
    }

    .li-n {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .li-b {
      font-size: 10px;
      color: var(--t3);
      background: var(--s2);
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-left: 6px;
      font-family: monospace
    }

    /* TOGGLE */
    #tog {
      position: absolute;
      left: 252px;
      top: 52px;
      z-index: 10;
      width: 20px;
      height: 40px;
      background: var(--sur);
      border: 1px solid var(--b);
      border-left: none;
      border-radius: 0 4px 4px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--t3);
      font-size: 9px;
      transition: all .25s
    }

    #tog:hover {
      color: var(--tx);
      background: var(--s2)
    }

    #panel.h~#tog {
      left: 0
    }

    /* INFO CARD */
    #card {
      position: absolute;
      right: 10px;
      bottom: 28px;
      z-index: 10;
      width: 218px;
      background: var(--sur);
      border: 1px solid var(--b);
      border-radius: 8px;
      padding: 13px;
      display: none;
      animation: up .2s ease
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    #card.v {
      display: block
    }

    #cn {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px
    }

    #ct {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 9px
    }

    .cr {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--t2);
      padding: 4px 0;
      border-bottom: 1px solid var(--b)
    }

    .cr:last-child {
      border: none
    }

    .cv {
      font-size: 11px;
      color: var(--tx);
      font-family: monospace
    }

    #cbtn {
      margin-top: 9px;
      width: 100%;
      padding: 6px 0;
      border-radius: 5px;
      background: var(--acd);
      color: var(--ac);
      border: 1px solid rgba(79, 142, 247, .3);
      font-size: 12px;
      font-family: var(--fn);
      cursor: pointer;
      transition: background .15s
    }

    #cbtn:hover {
      background: rgba(79, 142, 247, .25)
    }

    /* PILLS */
    #pills {
      position: absolute;
      top: 62px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .pi {
      padding: 5px 10px;
      background: var(--sur);
      border: 1px solid var(--b);
      border-radius: 4px;
      font-size: 11px;
      color: var(--t2);
      cursor: pointer;
      transition: all .15s;
      text-align: right
    }

    .pi:hover {
      color: var(--tx);
      border-color: var(--b2)
    }

    .pi.a {
      color: var(--ac);
      border-color: rgba(79, 142, 247, .4);
      background: var(--acd)
    }

    .pi.d {
      opacity: .3;
      pointer-events: none
    }

    /* LEGEND */
    #leg {
      position: absolute;
      left: 264px;
      bottom: 28px;
      z-index: 10;
      background: var(--sur);
      border: 1px solid var(--b);
      border-radius: 6px;
      padding: 9px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: left .25s
    }

    #leg.s {
      left: 10px
    }

    .lr {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--t2)
    }

    .ll {
      width: 18px;
      height: 3px;
      border-radius: 1px;
      flex-shrink: 0
    }

    /* LOADER / TOAST */
    #ld {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 5px 12px;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 0 0 6px 6px;
      font-size: 11px;
      color: var(--t3);
      display: none;
      gap: 7px;
      align-items: center
    }

    #ld.v {
      display: flex
    }

    .sp {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid var(--t3);
      border-top-color: var(--ac);
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #tst {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      color: var(--t2);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      white-space: nowrap
    }

    #tst.v {
      opacity: 1
    }

    /* MapLibre */
    .maplibregl-ctrl-bottom-right {
      right: 10px;
      bottom: 50px
    }

    .maplibregl-ctrl-bottom-left {
      display: none
    }

    .maplibregl-ctrl-group {
      background: var(--sur) !important;
      border: 1px solid var(--b) !important;
      border-radius: 6px !important
    }

    .maplibregl-ctrl-group button {
      background: transparent !important;
      color: var(--t2) !important
    }

    .maplibregl-ctrl-group button:hover {
      background: var(--s2) !important;
      color: var(--tx) !important
    }

    .maplibregl-ctrl-attrib {
      background: rgba(15, 17, 23, .75) !important;
      color: var(--t3) !important;
      font-size: 10px !important
    }

    .maplibregl-ctrl-attrib a {
      color: var(--t2) !important
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="bar">
    <div id="logo">
      <div id="dot"></div>Road-Pulse
    </div>
    <div id="bc"><span class="b a" onclick="goCountry()">Nepal</span></div>
    <div id="sw"><input id="s" type="text" placeholder="Search…" oninput="filterList(this.value)"></div>
  </div>

  <div id="ld">
    <div class="sp"></div><span id="lt">Loading…</span>
  </div>
  <div id="tog" onclick="togglePanel()">◀</div>

  <div id="panel">
    <div id="ph">
      <div id="plv">Country</div>
      <div id="pt">Nepal</div>
      <div id="ps">7 provinces</div>
    </div>
    <div id="pl"></div>
  </div>

  <div id="pills">
    <div class="pi a" id="pp" onclick="setLevel('province')">Province</div>
    <div class="pi d" id="pd" onclick="setLevel('district')">District</div>
    <div class="pi d" id="pm" onclick="setLevel('municipality')">Municipality</div>
  </div>

  <div id="card">
    <div id="cn">—</div>
    <div id="ct">—</div>
    <div id="cr"></div>
    <button id="cbtn" onclick="zoomSel()">Zoom to area</button>
  </div>

  <div id="leg">
    <div class="lr">
      <div class="ll" style="background:#00a6ff"></div>Province outline
    </div>
    <div class="lr">
      <div class="ll" style="background:#f5c842"></div>District
    </div>
    <div class="lr">
      <div class="ll" style="background:#64dc96"></div>Municipality
    </div>
    <div class="lr" style="margin-top:3px;padding-top:5px;border-top:1px solid var(--b)">
      <div class="ll"
        style="background:repeating-linear-gradient(90deg,#f5a623 0,#f5a623 4px,transparent 4px,transparent 7px)"></div>
      <span style="font-size:10px;color:var(--t3)">Nepal claim (disputed)</span>
    </div>
  </div>
  <div id="tst"></div>

    const $ = id => document.getElementById(id);
    function loader(t) { $('ld').classList.add('v'); $('lt').textContent = t }
    function noLoader() { $('ld').classList.remove('v') }
    function toast(m, d = 2500) { $('tst').textContent = m; $('tst').classList.add('v'); setTimeout(() => $('tst').classList.remove('v'), d) }

    function fetchOpts(ms) {
      return typeof AbortSignal !== 'undefined' && AbortSignal.timeout ? { signal: AbortSignal.timeout(ms) } : {};
    }

    function geomBounds(geom) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      function w(c) { if (typeof c[0] === 'number') { x0 = Math.min(x0, c[0]); x1 = Math.max(x1, c[0]); y0 = Math.min(y0, c[1]); y1 = Math.max(y1, c[1]); } else c.forEach(w) }
      w(geom.coordinates); return [[x0, y0], [x1, y1]];
    }

    function geojsonBounds(gj) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      (gj.features || []).forEach(f => {
        const b = geomBounds(f.geometry);
        x0 = Math.min(x0, b[0][0]); y0 = Math.min(y0, b[0][1]);
        x1 = Math.max(x1, b[1][0]); y1 = Math.max(y1, b[1][1]);
      });
      return Number.isFinite(x0) ? [[x0, y0], [x1, y1]] : [[79.85, 26.3], [88.3, 30.55]];
    }

    function localTypeName(type) {
      return {
        Gaunpalika: 'Rural Municipality',
        Nagarpalika: 'Municipality',
        Mahanagarpalika: 'Metropolitan City',
        Upamahanagarpalika: 'Sub-metropolitan City'
      }[type] || type;
    }

    function muniName(props) {
      return props.name || props.GaPa_NaPa || props['name:en'] || props.name_en || props.name_ne || props['name:ne'] || 'Unknown';
    }

    function muniType(props) {
      return props.type || localTypeName(props.Type_GN) || props['name:suffix:en'] || props.name_suffix_en || props['name:suffix'] || 'Municipality';
    }

    function provinceById(id) {
      return provinceGJ.features.find(f => +f.properties.id === +id);
    }

    function provinceIdFromProps(props, idx) {
      const keys = [
        'id', 'ID', 'province', 'PROVINCE', 'Province', 'PROVINCE_ID', 'Province_ID',
        'STATE_CODE', 'State_Code', 'state_code', 'STATE', 'State', 'ADM1_CODE',
        'ADM1_EN', 'name', 'NAME'
      ];
      for (const key of keys) {
        const value = props[key];
        if (value == null) continue;
        const text = String(value).trim();
        const named = PROVINCE_NAME_TO_ID[text.toLowerCase()];
        if (named) return named;
        const n = Number(text);
        if (Number.isInteger(n) && n >= 1 && n <= 7) return n;
        const m = text.match(/\b([1-7])\b/);
        if (m) return +m[1];
      }
      return idx + 1;
    }

    function normalizeProvinceGeoJSON(gj) {
      if (!gj?.features?.length) throw new Error('empty province data');
      const features = gj.features
        .filter(f => f.geometry)
        .map((f, i) => {
          const props = f.properties || {};
          const id = provinceIdFromProps(props, i);
          const meta = PROVINCE_META[id] || {
            name: props.name || props.NAME || `Province ${id}`,
            hq: '—',
            color: '#4f8ef7',
            ndist: DISTRICTS[id]?.length || 0
          };
          return {
            ...f,
            id,
            properties: { ...props, id, name: meta.name, hq: meta.hq, color: meta.color, ndist: meta.ndist }
          };
        })
        .sort((a, b) => a.properties.id - b.properties.id);
      return { type: 'FeatureCollection', features };
    }

    async function loadProvinceBoundaries() {
      // const urls = [
      //   PROVINCE_URL,
      //   'https://cdn.jsdelivr.net/gh/mesaugat/geoJSON-Nepal@master/nepal-states.geojson'
      // ];
      const urls = [
        'data/province.geojson',
      ];
      for (const url of urls) {
        try {
          const r = await fetch(url, fetchOpts(9000));
          if (!r.ok) throw new Error(r.status);
          const gj = normalizeProvinceGeoJSON(await r.json());
          if (gj.features.length < 7) throw new Error('missing province features');
          provinceGJ = gj;
          console.log('✓ Accurate province boundaries loaded:', url);
          return true;
        } catch (e) {
          console.warn('Province boundary load failed:', e.message);
        }
      }
      provinceGJ = normalizeProvinceGeoJSON(PROVGJ);
      toast('Using fallback province sketch; real boundary failed to load', 3500);
      return false;
    }

    function srcSet(id, data) {
      if (map.getSource(id)) map.getSource(id).setData(data);
      else map.addSource(id, { type: 'geojson', data });
    }
    function rmL(id) { if (map.getLayer(id)) map.removeLayer(id) }
    function clearFS(src) {
      try { map.removeFeatureState({ source: src }); } catch (e) { }

    function provinceAtPoint(point) {
      if (!map.getLayer('pf')) return null;
      return map.queryRenderedFeatures(point, { layers: ['pf'] })[0] || null;

    function liftProvinceHighlight() {
      // Move province boundary lines + selection to the very top of the layer stack,
      // so they always render above district fills/lines and disputed overlays.
      [
        'province-outline-bg', 'province-outline',
        'province-selected-outline-bg', 'province-selected-outline'
      ].forEach(id => {
        if (map.getLayer(id)) map.moveLayer(id);

      if (map.getLayer('pla')) map.moveLayer('pla');
    }

    // Update the dynamic filter on the selected-outline layers
    // so only the selected province feature shows the bright cyan border.
    function updateSelectionFilter() {
      if (selProv) {
        const filt = ['==', ['get', 'id'], selProv.properties.id];
        if (map.getLayer('province-selected-outline-bg')) map.setFilter('province-selected-outline-bg', filt);
        if (map.getLayer('province-selected-outline')) map.setFilter('province-selected-outline', filt);
      } else {
        const none = ['==', ['get', 'id'], -1];
        if (map.getLayer('province-selected-outline-bg')) map.setFilter('province-selected-outline-bg', none);
        if (map.getLayer('province-selected-outline')) map.setFilter('province-selected-outline', none);
      }
    }

    // Convert polygon features → LineString features for reliable boundary rendering
    function polygonsToLines(geojson) {
      const features = [];
      geojson.features.forEach(f => {
        const rings = f.geometry.type === 'Polygon' ? f.geometry.coordinates
          : f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates.flat()
            : [];
        rings.forEach(ring => {
          features.push({
            type: 'Feature',
            properties: { ...f.properties },
            geometry: { type: 'LineString', coordinates: ring }
          });
        });
      });
      return { type: 'FeatureCollection', features };
    }

    function buildProvLayer() {
      srcSet('provinces', provinceGJ);

      // Build a separate LineString source from polygon rings for reliable line rendering
      const provLines = polygonsToLines(provinceGJ);
      srcSet('prov-lines', provLines);

      [
        'pf', 'pf-hover',
        'province-outline-bg', 'province-outline',
        'province-selected-outline-bg', 'province-selected-outline',
        'pla'
      ].forEach(rmL);

      // Province fill — visible tint in neutral, stronger blue on selection
      map.addLayer({
        id: 'pf', type: 'fill', source: 'provinces', paint: {
          'fill-color': ['case',
            ['boolean', ['feature-state', 'sel'], false], '#1865d8',
            ['get', 'color']],
          'fill-opacity': ['case',
            ['boolean', ['feature-state', 'sel'], false], 0.32,
            ['boolean', ['feature-state', 'hover'], false], 0.14,
            0.06]
        }
      });

      // Hover highlight fill (subtle glow when mousing over a province)
      map.addLayer({
        id: 'pf-hover', type: 'fill', source: 'provinces', paint: {
          'fill-color': '#00a6ff',
          'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.08, 0]
        }
      });

      // ── Blue province outlines ── rendered from LineString source for reliability
      // Dark halo behind the blue line for contrast
      map.addLayer({
        id: 'province-outline-bg', type: 'line', source: 'prov-lines', paint: {
          'line-color': '#001844',
          'line-width': ['interpolate', ['linear'], ['zoom'], 4, 5, 7, 7, 10, 10],
          'line-opacity': 0.96
        }
      });
      // Main blue boundary — all provinces, always
      map.addLayer({
        id: 'province-outline', type: 'line', source: 'prov-lines', paint: {
          'line-color': '#00a6ff',
          'line-width': ['interpolate', ['linear'], ['zoom'], 4, 2.2, 7, 3.2, 10, 4.8],
          'line-opacity': 1
        }
      });

      // ── Selected province gets a brighter / wider cyan outline ──
      map.addLayer({
        id: 'province-selected-outline-bg', type: 'line', source: 'prov-lines',
        filter: ['==', ['get', 'id'], -1],
        paint: {
          'line-color': '#003399',
          'line-width': ['interpolate', ['linear'], ['zoom'], 4, 9, 7, 11, 10, 15],
          'line-opacity': 1
        }
      });
      map.addLayer({
        id: 'province-selected-outline', type: 'line', source: 'prov-lines',
        filter: ['==', ['get', 'id'], -1],
        paint: {
          'line-color': '#75d7ff',
          'line-width': ['interpolate', ['linear'], ['zoom'], 4, 4.5, 7, 5.8, 10, 8],
          'line-opacity': 1
        }
      });

      // Province labels
      map.addLayer({
        id: 'pla', type: 'symbol', source: 'provinces', layout: {
          'text-field': ['get', 'name'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 5, 9, 9, 14],
          'text-font': ['Open Sans Semibold'],
          'text-max-width': 8
        }, paint: {
          'text-color': '#dde2f0', 'text-halo-color': '#0f1117', 'text-halo-width': 2
        }
      });

      console.log('✓ Province layers built — prov-lines features:', provLines.features.length);

      // ── Hover tracking ──
      let hoveredProvId = null;
      map.on('mousemove', 'pf', e => {
        if (e.features.length > 0) {
          if (hoveredProvId !== null) map.setFeatureState({ source: 'provinces', id: hoveredProvId }, { hover: false });
          hoveredProvId = e.features[0].id;
          map.setFeatureState({ source: 'provinces', id: hoveredProvId }, { hover: true });
          map.getCanvas().style.cursor = 'pointer';
        }
      });
      map.on('mouseleave', 'pf', () => {
        if (hoveredProvId !== null) map.setFeatureState({ source: 'provinces', id: hoveredProvId }, { hover: false });
        hoveredProvId = null;
        map.getCanvas().style.cursor = '';
      });

      // ── Click handler on fills ──
      map.on('click', 'pf', e => { if (e.features[0]) onProvClick(e.features[0]); });
      // Click on outline lines → find province fill under the click point
      ['province-outline-bg', 'province-outline'].forEach(id => {
        map.on('click', id, e => {
          const pf = provinceAtPoint(e.point);
          if (pf) onProvClick(pf);
        });
        map.on('mouseenter', id, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', id, () => map.getCanvas().style.cursor = '');
      });
    }

            id: 'ddf', type: 'fill', source: 'districts', paint: {
              'fill-color': ['case', ['boolean', ['feature-state', 'sel'], false], 'rgba(245,200,66,0.22)', 'rgba(245,200,66,0.04)'],
              'fill-opacity': ['interpolate', ['linear'], ['zoom'], 5, 0, 6.5, 0.3, 7, 1]
            }
          });
          // District boundary lines
          map.addLayer({
            id: 'ddl', type: 'line', source: 'districts', paint: {
              'line-color': '#f5c842',
              'line-width': ['interpolate', ['linear'], ['zoom'], 5, 0.2, 7, 0.7, 12, 1.6],
              'line-opacity': ['interpolate', ['linear'], ['zoom'], 5, 0, 6.5, 0.4, 7, 0.75],
              'line-dasharray': [3, 2]
            }
          });
          // District labels
          map.addLayer({
            id: 'ddla', type: 'symbol', source: 'districts', minzoom: 8, layout: {
              'text-field': ['coalesce', ['get', 'DISTRICT'], ['get', 'name'], ['get', 'NAME']],
              'text-size': ['interpolate', ['linear'], ['zoom'], 8, 8, 12, 12],
              'text-font': ['Open Sans Semibold'], 'text-max-width': 7
            }, paint: { 'text-color': '#d4c080', 'text-halo-color': '#0f1117', 'text-halo-width': 1.5 }
          });
          // Province outlines must always be on top of districts
          liftProvinceHighlight();

          map.on('click', 'ddf', e => {
            if (!e.features[0]) return;
            if (activeLevel === 'province') {
              const pf = provinceAtPoint(e.point);
              if (pf) onProvClick(pf);
              return;
            }
            const f = e.features[0];
            const dn = f.properties.DISTRICT || f.properties.name || f.properties.NAME || 'District';
            let pid = null;
            for (const [k, v] of Object.entries(DISTRICTS)) {
              if (v.some(d => d.toLowerCase() === dn.toLowerCase())) { pid = +k; break; }
            }
            if (pid && !selProv) {
              const pf = provinceById(pid);
              if (pf) { selProv = pf; clearFS('provinces'); map.setFeatureState({ source: 'provinces', id: pf.id }, { sel: true }); updateSelectionFilter(); liftProvinceHighlight(); }
            }
            clearFS('districts');
            map.setFeatureState({ source: 'districts', id: f.id }, { sel: true });
            onDistClick(dn, pid || selProv?.properties?.id || 1);
          });
          map.on('mouseenter', 'ddf', () => map.getCanvas().style.cursor = 'pointer');
          map.on('mouseleave', 'ddf', () => map.getCanvas().style.cursor = '');
          console.log('✓ District polygons loaded');
          
          
          return true;
        } catch (e) { console.warn('District CDN failed:', e.message); }
      }
      return false;
    }
    
    // ════════════════════════════════════════════════════════════════════
    // MUNICIPALITY LAYER — loads from data/municipalities.geojson
    // ════════════════════════════════════════════════════════════════════
    async function loadMunicipalityData() {
      if (allMuniGJ) return allMuniGJ;
      try {
        const r = await fetch('data/municipalities.geojson', fetchOpts(10000));
        if (!r.ok) throw new Error(r.status);
        allMuniGJ = await r.json();
        // Filter to polygon/multipolygon only
        allMuniGJ.features = allMuniGJ.features.filter(f =>
          f.geometry.type === 'Polygon' || f.geometry.type === 'MultiPolygon'
        );
        allMuniGJ.features.forEach((f, i) => {
          if (f.id == null) f.id = i;
          const p = f.properties || {};
          f.properties = {
            ...p,
            osm_id: p.osm_id || p.id || f.id,
            name: muniName(p),
            name_ne: p.name_ne || p['name:ne'] || '',
            type: muniType(p),
            admin_level: Number(p.admin_level) || 7
          };
        });
        updateMuniCountsFromData();
        console.log('✓ Municipality data loaded:', allMuniGJ.features.length, 'features');
        return allMuniGJ;
      } catch (e) {
        console.warn('Municipality data load failed:', e.message);
        return null;
      }
    }

    function getMunisForDistrict(districtName) {
      if (!allMuniGJ) return { type: 'FeatureCollection', features: [] };
      // Convert CDN district name to GeoJSON district name
      const geoJsonDistrictName = CDN_TO_GEOJSON_DISTRICT[districtName] || districtName;
      return {
        type: 'FeatureCollection',
        features: allMuniGJ.features.filter(f =>
          f.properties.district?.toLowerCase() === geoJsonDistrictName.toLowerCase()
        )
      };
    }

    function updateMuniCountsFromData() {
      if (!allMuniGJ) return;
      const counts = {};
      allMuniGJ.features.forEach(f => {
        const district = f.properties?.district;
        if (!district) return;
        counts[district] = (counts[district] || 0) + 1;
      });
      Object.assign(MUNI_CNT, counts);
    }

    function muniCount(districtName) {
      if (allMuniGJ) return getMunisForDistrict(districtName).features.length;
      return MUNI_CNT[districtName] || 0;
    }

    let hoveredMuniId = null;
    function buildMuniLayer(districtName) {
      const muniGJ = getMunisForDistrict(districtName);
      if (!muniGJ.features.length) {
        // No real boundary data for this district yet — hide layers
        ['mf', 'ml', 'mla'].forEach(rmL);
        return;
      }
      srcSet('municipalities', muniGJ);
      ['mf', 'ml', 'mla'].forEach(rmL);

      // Municipality fills
      map.addLayer({
        id: 'mf', type: 'fill', source: 'municipalities',
        paint: {
          'fill-color': ['case',
            ['boolean', ['feature-state', 'sel'], false], 'rgba(100,220,150,0.25)',
            ['boolean', ['feature-state', 'hover'], false], 'rgba(100,220,150,0.12)',
            'rgba(100,220,150,0.05)'
          ]
        }
      });
      // Municipality boundary lines
      map.addLayer({
        id: 'ml', type: 'line', source: 'municipalities',
        paint: {
          'line-color': '#64dc96',
          'line-width': ['interpolate', ['linear'], ['zoom'], 8, 0.5, 12, 1.5, 15, 2.5],
          'line-opacity': 0.85
        }
      });
      // Municipality labels
      map.addLayer({
        id: 'mla', type: 'symbol', source: 'municipalities',
        minzoom: 10,
        layout: {
          'text-field': ['get', 'name'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 10, 9, 14, 13],
          'text-font': ['Open Sans Semibold'], 'text-max-width': 7
        },
        paint: { 'text-color': '#a8f0c0', 'text-halo-color': '#0f1117', 'text-halo-width': 1.5 }
      });
      liftProvinceHighlight();

      // Hover
      map.on('mousemove', 'mf', e => {
        if (e.features.length > 0) {
          if (hoveredMuniId !== null) map.setFeatureState({ source: 'municipalities', id: hoveredMuniId }, { hover: false });
          hoveredMuniId = e.features[0].id;
          map.setFeatureState({ source: 'municipalities', id: hoveredMuniId }, { hover: true });
          map.getCanvas().style.cursor = 'pointer';
        }
      });
      map.on('mouseleave', 'mf', () => {
        if (hoveredMuniId !== null) map.setFeatureState({ source: 'municipalities', id: hoveredMuniId }, { hover: false });
        hoveredMuniId = null;
        map.getCanvas().style.cursor = '';
      });
      // Click
      map.on('click', 'mf', e => {
        if (!e.features[0]) return;
        const f = e.features[0];
        const p = f.properties;
        const name = muniName(p);
        const type = muniType(p);
        activeLevel = 'municipality';
        setActivePill('municipality');
        clearFS('municipalities');
        map.setFeatureState({ source: 'municipalities', id: f.id }, { sel: true });
        showCard(name, type, [
          { l: 'District', v: p.district || selDist || '—' },
          { l: 'Province', v: selProv?.properties?.name || '—' },
          { l: 'Type', v: type }
        ], '#64dc96');
        const b = geomBounds(f.geometry);
        map.fitBounds(b, { padding: { top: 80, bottom: 60, left: 265, right: 60 }, duration: 600 });
      });
      console.log('✓ Municipality layer built for', districtName, '—', muniGJ.features.length, 'municipalities');
    }

    // ════════════════════════════════════════════════════════════════════
    // CLICK HANDLERS
    // ════════════════════════════════════════════════════════════════════
    function onProvClick(f) {
      selProv = f; selDist = null;
      activeLevel = 'district';
      clearFS('provinces');
      clearFS('districts');
      map.setFeatureState({ source: 'provinces', id: f.id }, { sel: true });
      updateSelectionFilter();
      liftProvinceHighlight();
      const p = f.properties;
      showCard(p.name, 'Province', [
        { l: 'Headquarters', v: p.hq },
        { l: 'Districts', v: p.ndist },
        { l: 'Admin level', v: 1 }
      ], p.color);
      setBc([{ t: 'Nepal', fn: 'goCountry()' }, { t: p.name, active: true }]);
      enablePill('pd'); disablePill('pm'); setActivePill('district');
      panelDistricts(p.id, p.name, p.color);
      // Zoom to province
      const b = geomBounds(f.geometry);
      map.fitBounds(b, { padding: { top: 80, bottom: 60, left: 265, right: 60 }, duration: 600 });
    }

    async function onDistClick(dn, pid) {
      selDist = dn;
      activeLevel = 'district';
      const pf = provinceById(pid);
      const pn = pf ? pf.properties.name : '';
      const pc = pf ? pf.properties.color : '#4f8ef7';
      const displayName = formatDistrictName(dn);
      const showDistrictCard = () => showCard(displayName, 'District', [
        { l: 'Province', v: pn },
        { l: 'Local boundaries', v: muniCount(dn) || '—' },
        { l: 'Admin level', v: 2 }
      ], '#f5c842');
      showDistrictCard();
      setBc([{ t: 'Nepal', fn: 'goCountry()' }, { t: pn, fn: `goProvince(${pid})` }, { t: displayName, active: true }]);
      enablePill('pm'); setActivePill('district');
      const needsMuniLoad = !allMuniGJ;
      if (needsMuniLoad) loader('Loading local boundaries…');
      try {
        await loadMunicipalityData();
      } finally {
        if (needsMuniLoad) noLoader();
      }
      showDistrictCard();
      panelMunis(dn, pid, pc);
      buildMuniLayer(dn);
    }

    // ════════════════════════════════════════════════════════════════════
    // NAVIGATION
    // ════════════════════════════════════════════════════════════════════
    function goCountry() {
      selProv = null; selDist = null;
      activeLevel = 'province';
      clearFS('provinces');
      clearFS('districts');
      // Hide municipality layers when going back to country view
      ['mf', 'ml', 'mla'].forEach(rmL);
      updateSelectionFilter();
      $('card').classList.remove('v');
      setBc([{ t: 'Nepal', active: true }]);
      disablePill('pd'); disablePill('pm');
      setActivePill('province');
      liftProvinceHighlight();
      panelProvinces();
      map.fitBounds(geojsonBounds(provinceGJ), { padding: 40, duration: 700 });
    }

    function goProvince(id) {
      const f = provinceById(id);
      if (f) onProvClick(f);
    }

    function zoomSel() {
      if (selProv) { const b = geomBounds(selProv.geometry); map.fitBounds(b, { padding: { top: 80, bottom: 60, left: 265, right: 60 }, duration: 600 }); }
    }

    // ════════════════════════════════════════════════════════════════════
    // PANEL
    // ════════════════════════════════════════════════════════════════════
    function panelProvinces() {
      $('plv').textContent = 'Country';
      $('pt').textContent = 'Nepal';
      $('ps').textContent = '7 provinces';
      items = provinceGJ.features.map(f => ({
        name: f.properties.name,
        badge: `${f.properties.ndist} dist`,
        color: f.properties.color,
        fn: () => { clearFS('provinces'); map.setFeatureState({ source: 'provinces', id: f.id }, { sel: true }); updateSelectionFilter(); onProvClick(f); }
      })).sort((a, b) => a.name.localeCompare(b.name));
      renderList();
    }

    function panelDistricts(pid, pname, color) {
      const dists = (DISTRICTS[pid] || []).slice().sort();
      $('plv').textContent = 'Province';
      $('pt').textContent = pname;
      $('ps').textContent = dists.length + ' districts';
      items = dists.map(d => {
        const cnt = muniCount(d);
        return {
          name: formatDistrictName(d), badge: `${cnt || '?'} loc`, color: '#f5c842',
          fn: () => onDistClick(d, pid)
        };
      });
      renderList();
    }

    function panelMunis(dist, pid, pc) {
      $('plv').textContent = 'District';
      $('pt').textContent = formatDistrictName(dist);

      // Check if we have real municipality data for this district
      const realMunis = getMunisForDistrict(dist).features;

      if (realMunis.length) {
        // Use real local boundary names from GeoJSON
        $('ps').textContent = realMunis.length + ' local boundaries';
        items = realMunis.map(f => {
          const p = f.properties;
          const name = muniName(p);
          const type = muniType(p);
          const typeBadge = type.split(' ')[0].slice(0, 4).toLowerCase();
          return {
            name,
            badge: typeBadge,
            color: '#64dc96',
            fn: () => {
              activeLevel = 'municipality';
              setActivePill('municipality');
              clearFS('municipalities');
              map.setFeatureState({ source: 'municipalities', id: f.id }, { sel: true });
              showCard(name, type, [
                { l: 'District', v: dist },
                { l: 'Province', v: selProv?.properties?.name || '—' },
                { l: 'Type', v: type }
              ], '#64dc96');
              const b = geomBounds(f.geometry);
              map.fitBounds(b, { padding: { top: 80, bottom: 60, left: 265, right: 60 }, duration: 600 });
            }
          };
        }).sort((a, b) => a.name.localeCompare(b.name));
      } else {
        // Fallback: placeholder names
        const cnt = MUNI_CNT[dist] || 0;
        $('ps').textContent = cnt + ' local boundaries';
        const types = ['Metropolitan City', 'Sub-metropolitan City', 'Municipality', 'Rural Municipality'];
        items = [];
        for (let i = 1; i <= cnt; i++) {
          const t = i === 1 ? types[0] : i === 2 && cnt > 8 ? types[1] : i < Math.ceil(cnt * .65) ? types[2] : types[3];
          const sn = t.split(' ')[0];
          items.push({
            name: `${dist} ${sn} ${i}`,
            badge: sn.slice(0, 4).toLowerCase(),
            color: '#64dc96',
            fn: () => {
              activeLevel = 'municipality';
              setActivePill('municipality');
              showCard(`${dist} ${t} ${i}`, 'Municipality', [
                { l: 'District', v: dist }, { l: 'Type', v: t }, { l: 'Wards', v: i <= 5 ? 32 : i <= 10 ? 19 : 15 }
              ], '#64dc96');
            }
          });
        }
      }
      renderList();
    }

    function renderList(filter = '') {
      const list = $('pl'); list.innerHTML = '';
      const low = (filter || $('s').value).toLowerCase();
      const shown = items.filter(it => it.name.toLowerCase().includes(low));
      if (!shown.length) {
        list.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--t3)">No results</div>';
        return;
      }
      shown.forEach(it => {
        const d = document.createElement('div');
        d.className = 'li';
        d.innerHTML = `<span class="li-n" title="${it.name}">${it.name}</span><span class="li-b">${it.badge}</span>`;
        d.onclick = () => {
          document.querySelectorAll('.li').forEach(x => x.classList.remove('on'));
          d.classList.add('on');
          it.fn();
        };
        list.appendChild(d);
      });
    }

    function filterList(q) { renderList(q) }

    // ════════════════════════════════════════════════════════════════════
    // CARD / BREADCRUMB / PILLS
    // ════════════════════════════════════════════════════════════════════
    function showCard(name, type, rows, color) {
      $('cn').textContent = name;
      $('cn').style.color = color || 'var(--tx)';
      $('ct').textContent = type;
      $('cr').innerHTML = rows.map(r => `<div class="cr"><span>${r.l}</span><span class="cv">${r.v}</span></div>`).join('');
      $('card').classList.add('v');
    }

    function setBc(parts) {
      $('bc').innerHTML = parts.map((p, i) => {
        const sep = i < parts.length - 1 ? '<span class="bs">/</span>' : '';
        const click = p.fn ? `onclick="${p.fn}"` : '';
        return `<span class="b${p.active ? ' a' : ''}" ${click}>${p.t}</span>${sep}`;
      }).join('');
    }

    function enablePill(id) { $(id).classList.remove('d') }
    function disablePill(id) { $(id).classList.add('d'); $(id).classList.remove('a') }
    function setActivePill(level) {
      Object.values(PILL_BY_LEVEL).forEach(id => $(id).classList.remove('a'));
      const id = PILL_BY_LEVEL[level];
      if (id && !$(id).classList.contains('d')) $(id).classList.add('a');
    }
    function setLevel(level) {
      if (level === 'province') { goCountry(); return; }
      const id = PILL_BY_LEVEL[level];
      if (!id || $(id).classList.contains('d')) {
        toast(level === 'district' ? 'Select a province first' : 'Select a district first');
        return;
      }
      if (level === 'district') {
        if (!selProv) { toast('Select a province first'); return; }
        activeLevel = 'district';
        setActivePill('district');
        const p = selProv.properties;
        panelDistricts(p.id, p.name, p.color);
      } else if (level === 'municipality') {
        if (!selDist) { toast('Select a district first'); return; }
        activeLevel = 'municipality';
        setActivePill('municipality');
        const pid = selProv?.properties?.id || 1;
        const pc = selProv?.properties?.color || '#4f8ef7';
        panelMunis(selDist, pid, pc);
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // MAIN
    // ════════════════════════════════════════════════════════════════════
    async function init() {
      map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: {
            'cd': {
              type: 'raster',
              tiles: ['https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png',
                'https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png'],
              tileSize: 256, attribution: '© CARTO © OpenStreetMap contributors'
            }
          },
          layers: [{ id: 'bg', type: 'raster', source: 'cd', paint: { 'raster-opacity': 0.92 } }],
          glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
        },
        // Wide enough to show Sudurpashchim far west (Limpiyadhura ~80°E)
        center: [84.2, 28.2], zoom: 6.5, minZoom: 5, maxZoom: 18
      });

      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');
      map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

      map.on('load', async () => {
        loader('Loading accurate province boundaries…');
        await loadProvinceBoundaries();
        loader('Building layers…');
        buildProvLayer();
        // buildDisputedLayer();
        panelProvinces();
        noLoader();
        toast('Click a province or select from the list');
        // Try loading real district polygons in background
        tryDistrictLayer();
        // Pre-load municipality data in background
        loadMunicipalityData();
      });
    }

    init();
  </script>
</body>

</html>
